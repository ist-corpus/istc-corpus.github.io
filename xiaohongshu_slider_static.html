<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书语料滑动浏览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body { background: #f7f8fa; padding: 20px; }
        .container { max-width: 420px; margin: 0 auto; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .back-btn {
            padding: 8px 14px;
            background: #ff3860;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .title { font-size: 18px; font-weight: 600; }
        .slider-wrap {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 20px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .slider {
            display: flex;
            transition: transform 0.4s ease;
            height: 720px;
        }
        .post {
            min-width: 100%;
            height: 100%;
            padding: 24px;
            overflow-y: auto;
        }
        .post-media {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .post-text {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            white-space: pre-line;
        }
        .post-id {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
        }
        .prev { left: 10px; }
        .next { right: 10px; }
        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
        }
        .dot.active { background: #ff3860; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <button class="back-btn" onclick="window.location.href='index.html'">← 返回首页</button>
            <h1 class="title">小红书语料滑动浏览</h1>
        </div>
        <div class="slider-wrap">
            <button class="nav-btn prev" onclick="prev()">&lt;</button>
            <div class="slider" id="slider"></div>
            <button class="nav-btn next" onclick="next()">&gt;</button>
        </div>
        <div class="dots" id="dots"></div>
    </div>
    <script>
        // 自动生成的帖子数据，无需手动修改
        const POSTS = [{'id': '5fdafaae0000000001004de9', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/5fdafaae0000000001004de9/0.jpg" alt="帖子图片">'}, {'id': '63b01620000000001f002866', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/63b01620000000001f002866/0.jpg" alt="帖子图片">'}, {'id': '63c7dc5e000000001c00670f', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/63c7dc5e000000001c00670f/0.jpg" alt="帖子图片">'}, {'id': '65a23104000000001a000171', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/65a23104000000001a000171/0.jpg" alt="帖子图片">'}, {'id': '65a47d6f000000001d036c18', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/65a47d6f000000001d036c18/0.jpg" alt="帖子图片">'}, {'id': '65a7d66e0000000028026fd8', 'text': '未找到对应文字内容', 'mediaHtml': '<div style="color:#999; padding:10px;">未检测到图片/视频文件</div>'}, {'id': '65a910f2000000002803bee4', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/65a910f2000000002803bee4/0.jpg" alt="帖子图片">'}, {'id': '65ab35320000000010038288', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/65ab35320000000010038288/0.jpg" alt="帖子图片">'}, {'id': '65b35378000000002d002e80', 'text': '未找到对应文字内容', 'mediaHtml': '<div style="color:#999; padding:10px;">未检测到图片/视频文件</div>'}, {'id': '65b844ae000000002c0112d8', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/65b844ae000000002c0112d8/0.jpg" alt="帖子图片">'}, {'id': '65b9f0d80000000002011bf5', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/65b9f0d80000000002011bf5/0.jpg" alt="帖子图片">'}, {'id': '65bb96140000000011006827', 'text': '未找到对应文字内容', 'mediaHtml': '<div style="color:#999; padding:10px;">未检测到图片/视频文件</div>'}, {'id': '65beef8b000000000702ae16', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/65beef8b000000000702ae16/0.jpg" alt="帖子图片">'}, {'id': '65c9869b000000000c004109', 'text': '未找到对应文字内容', 'mediaHtml': '<img class="post-media" src="posts/65c9869b000000000c004109/0.jpg" alt="帖子图片">'}, {'id': '65cc41d8000000000b016fb5', 'text': '未找到对应文字内容', 'mediaHtml': '<div style="color:#999; padding:10px;">未检测到图片/视频文件</div>'}, {'id': '65d2c68b00000000070264b6', 'text': '未找到对应文字内容', 'mediaHtml': '<div style="color:#999; padding:10px;">未检测到图片/视频文件</div>'}, {'id': '68f7592d0000000004007770', 'text': '未找到对应文字内容', 'mediaHtml': '<div style="color:#999; padding:10px;">未检测到图片/视频文件</div>'}];
        let current = 0;
        const slider = document.getElementById("slider");
        const dots = document.getElementById("dots");

        // 页面加载时一次性渲染所有帖子
        window.onload = function() {
            renderAllPosts();
            update();
            renderDots();
        };

        // 渲染所有帖子卡片
        function renderAllPosts() {
            slider.innerHTML = POSTS.map(post => `
                <div class="post">
                    <div class="post-id">ID：${post.id}</div>
                    ${post.mediaHtml}
                    <div class="post-text">${post.text}</div>
                </div>
            `).join('');
        }

        // 滑动控制
        function prev() {
            if (current > 0) current--;
            update();
        }
        function next() {
            if (current < POSTS.length - 1) current++;
            update();
        }
        function update() {
            slider.style.transform = `translateX(-${current * 100}%)`;
            renderDots();
        }

        // 底部指示器
        function renderDots() {
            dots.innerHTML = "";
            POSTS.forEach((_, i) => {
                const dot = document.createElement("div");
                dot.className = `dot ${i === current ? "active" : ""}`;
                dots.appendChild(dot);
            });
        }
    </script>
</body>
</html>
